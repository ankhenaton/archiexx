<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archie - Kişisel Asistan</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body { display: flex; min-height: 100vh; flex-direction: column; background-color: #f5f5f5; }
        main { flex: 1 0 auto; padding: 20px; }
        .note-card { border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="blue-grey darken-3">
        <div class="nav-wrapper container">
            <a href="/" class="brand-logo"><i class="material-icons">memory</i> Archie</a>
            <ul id="nav-mobile" class="right hide-on-med-and-down">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/archive">Dosya Arşivi</a></li>
                <li><a href="/admin">Ayarlar</a></li>
                <li><a href="/logout">Çıkış</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <script>M.toast({html: '{{ message }}', classes: 'rounded'});</script>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.css"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            M.AutoInit(); // Materialize JS bileşenlerini otomatik başlatır (Datepicker, Modal vs.)
        });
    </script>
</body>
</html>
